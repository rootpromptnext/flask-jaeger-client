apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-jaeger
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-jaeger
  template:
    metadata:
      labels:
        app: flask-jaeger
    spec:
      containers:
      - name: flask-jaeger
        image: flask-jaeger-client:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: JAEGER_AGENT_HOST
          value: "jaeger.observability.svc.cluster.local"
        - name: JAEGER_AGENT_PORT
          value: "6831"
---
apiVersion: v1
kind: Service
metadata:
  name: flask-jaeger
  namespace: observability
spec:
  type: NodePort
  selector:
    app: flask-jaeger
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30500
